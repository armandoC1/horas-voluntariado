name: Deploy Horas Voluntariado

on:
  push:
    branches:
      - main
      - qa
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configurar Entorno y Rutas
        run: |
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "DEST_PATH=$HOME/apps/horas-voluntariado-app/horas-voluntariado-prod" >> $GITHUB_ENV
            echo "PM2_NAME=horas-voluntariado-prod" >> $GITHUB_ENV
            echo "APP_PORT=3000" >> $GITHUB_ENV
            echo "ENV_CONTENT<<EOF" >> $GITHUB_ENV
            echo "${{ secrets.DOTENV_PROD }}" >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
          else
            echo "DEST_PATH=$HOME/apps/horas-voluntariado-app/horas-voluntariado-dev" >> $GITHUB_ENV
            echo "PM2_NAME=horas-voluntariado-dev" >> $GITHUB_ENV
            echo "APP_PORT=3001" >> $GITHUB_ENV
            echo "ENV_CONTENT<<EOF" >> $GITHUB_ENV
            echo "${{ secrets.DOTENV_QA }}" >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
          fi

      - name: Instalar dependencias y Build
        run: |
          npm ci
          # El uso de EOF aquí asegura que el .env se escriba con todas sus líneas
          cat <<EOF > .env
          ${{ env.ENV_CONTENT }}
          PORT=${{ env.APP_PORT }}
          EOF
          npm run build

      - name: Sincronizar archivos al servidor
        run: |
          rsync -avz --delete \
            --exclude '.git' \
            --exclude 'node_modules' \
            . ${{ env.DEST_PATH }}/

      - name: Reiniciar y Persistir PM2
        run: |
          cd ${{ env.DEST_PATH }}
          npm install --production
          # 1. Borrar proceso viejo de PM2
          pm2 delete ${{ env.PM2_NAME }} || true
          # 2. Matar cualquier proceso zombie que aún ocupe el puerto
          kill $(lsof -t -i:${{ env.APP_PORT }}) 2>/dev/null || true
          # 3. Esperar a que el SO libere el puerto
          sleep 2
          # 4. Iniciar con PORT explícito (Next.js >= 13 lo respeta)
          PORT=${{ env.APP_PORT }} pm2 start npm --name "${{ env.PM2_NAME }}" --cwd "${{ env.DEST_PATH }}" -- start
          pm2 save

      - name: Verificar puerto del servicio
        run: |
          sleep 3
          pm2 show ${{ env.PM2_NAME }} | grep -E "pid|port|status" || true
          echo "✅ Deploy completado en puerto ${{ env.APP_PORT }}"

      - name: Notificar a Slack
        uses: rtCamp/action-slack-notify@v2
        if: always()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_CHANNEL: 'horas-voluntariado'
          SLACK_COLOR: ${{ job.status == 'success' && 'good' || 'danger' }}
          SLACK_TITLE: '🚀 Deploy: ${{ env.PM2_NAME }}'
          SLACK_MESSAGE: |
            *Estado:* ${{ job.status == 'success' && '✅ Completado con éxito' || '❌ Falló el despliegue' }}
            *Rama:* `${{ github.ref_name }}`
            *Ruta en Server:* `${{ env.DEST_PATH }}`
            *Mensaje del Commit:* ${{ github.event.head_commit.message }}
            *Autor:* ${{ github.actor }}
          SLACK_FOOTER: 'Sistema de CI/CD - Carlos Hernández'